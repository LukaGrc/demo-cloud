name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions minimales par défaut. Chaque job n'élève que ce dont il a besoin.
permissions:
  contents: read

# Annule les runs en cours sur la même ref pour éviter les déploiements concurrents.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: notes-lgarcia-2847
  DEPLOY_REGION: europe-west9
  REGISTRY_REPO: notes-app
  REGISTRY_HOST: europe-west9-docker.pkg.dev

jobs:
  # ---------------------------------------------------------------------------
  # 1) Lint + tests unitaires de chaque microservice backend. Tourne sur push
  #    ET sur PR (gate de qualité).
  # ---------------------------------------------------------------------------
  quality:
    name: Lint & Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        service: [files-service, history-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run linter (ruff)
        run: ruff check .

      - name: Run unit tests (pytest)
        run: pytest -q

  # ---------------------------------------------------------------------------
  # 2) Build + push des images Docker vers Artifact Registry.
  #    Uniquement sur push main (pas sur PR → pas de push depuis un fork).
  # ---------------------------------------------------------------------------
  containerize:
    name: Build & Push images
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        service: [files-service, history-service, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY_HOST }} --quiet

      - name: Build and push ${{ matrix.service }} (SHA + latest)
        env:
          IMAGE: ${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ matrix.service }}
        run: |
          docker build \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            ${{ matrix.service }}
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  # ---------------------------------------------------------------------------
  # 3) Déploiement Cloud Run via Terraform avec la nouvelle image taguée.
  # ---------------------------------------------------------------------------
  release:
    name: Deploy to Cloud Run
    needs: containerize
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"

      - name: Terraform Init
        run: terraform init -input=false

      # Toutes les ressources GCP (Cloud Run, secrets, registre, monitoring) sont
      # ciblées explicitement : kubernetes.tf pointe vers un cluster minikube
      # local, indisponible dans l'environnement CI.
      - name: Terraform Apply (GCP resources only)
        env:
          TF_VAR_app_version: ${{ github.sha }}
          TF_VAR_pg_dsn: ${{ secrets.TF_DATABASE_URL }}
          TF_VAR_s3_key_id: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          TF_VAR_s3_key_secret: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          TF_VAR_s3_region: ${{ vars.AWS_DEFAULT_REGION }}
          TF_VAR_s3_bucket_name: ${{ vars.S3_BUCKET_NAME }}
          TF_VAR_alert_notification_email: ${{ vars.ALERT_NOTIFICATION_EMAIL }}
        run: |
          terraform apply -input=false -auto-approve \
            -target=google_artifact_registry_repository.notes_app \
            -target=google_project_service.secretmanager \
            -target=google_project_service.monitoring \
            -target=google_service_account.cloud_run_runtime \
            -target=google_secret_manager_secret.database_url \
            -target=google_secret_manager_secret_version.database_url \
            -target=google_secret_manager_secret.aws_access_key_id \
            -target=google_secret_manager_secret_version.aws_access_key_id \
            -target=google_secret_manager_secret.aws_secret_access_key \
            -target=google_secret_manager_secret_version.aws_secret_access_key \
            -target=google_secret_manager_secret_iam_member.database_url_access \
            -target=google_secret_manager_secret_iam_member.aws_access_key_id_access \
            -target=google_secret_manager_secret_iam_member.aws_secret_access_key_access \
            -target=google_cloud_run_v2_service.history_api \
            -target=google_cloud_run_v2_service.files_api \
            -target=google_cloud_run_v2_service.ui \
            -target=google_cloud_run_v2_service_iam_member.history_api_public \
            -target=google_cloud_run_v2_service_iam_member.files_api_public \
            -target=google_cloud_run_v2_service_iam_member.ui_public \
            -target=google_monitoring_notification_channel.email \
            -target=google_monitoring_uptime_check_config.service_health \
            -target=google_monitoring_alert_policy.service_down
